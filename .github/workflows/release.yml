name: Release Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # Build job - runs all checks and builds APKs
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Need full history for git describe

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a6eb569d40f678a6a45645d5f0cd7e7a2f09e # v4.0.1

      - name: Run ktlint
        working-directory: accounts-clerk/hermes-android
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run unit tests
        working-directory: accounts-clerk/hermes-android
        run: ./gradlew test --no-daemon

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > accounts-clerk/hermes-android/keystore.jks

      - name: Get version from git
        id: version
        working-directory: accounts-clerk/hermes-android
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName --no-daemon 2>/dev/null || echo "0.1.1")
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"

      - name: Build release APKs
        working-directory: accounts-clerk/hermes-android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache

      - name: Upload APKs
        uses: actions/upload-artifact@ea165f94d65e9e777e809609a6f9b176274049d2 # v4.6.2
        with:
          name: release-apks
          path: accounts-clerk/hermes-android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # Release job - creates GitHub release (only after build succeeds)
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download APKs
        uses: actions/download-artifact@9c19ed7fe5d0c5a9e942c0e1467846f9f1a33c06 # v4.2.1
        with:
          name: release-apks
          path: apks/

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        env:
          PREV_TAG: ${{ steps.prev_tag.outputs.prev_tag }}
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
        run: |
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          {
            echo "notes<<EOF"
            echo "## Changes"
            echo ""
            echo "$NOTES"
            echo ""
            echo "## Downloads"
            echo ""
            echo "- **app-arm64-v8a-release.apk** - For most modern Android devices (ARM64)"
            echo "- **app-x86-release.apk** - For x86 emulators and devices"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Git tag
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "v${VERSION_NAME}" || echo "Tag v${VERSION_NAME} already exists"
          git push origin "v${VERSION_NAME}" || echo "Tag already pushed"

      - name: Create GitHub Release
        env:
          VERSION_NAME: ${{ needs.build.outputs.version_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION_NAME}" \
            --title "Release v${VERSION_NAME}" \
            --notes-file - << 'NOTES_EOF'
          ${{ steps.notes.outputs.notes }}
          NOTES_EOF
          gh release upload "v${VERSION_NAME}" apks/*.apk