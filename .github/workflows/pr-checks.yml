name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  ktlint:
    name: Kotlin Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a6eb569d40f678a6a45645d5f0cd7e7a2f09e # v4.0.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run ktlint
        working-directory: accounts-clerk/hermes-android
        run: ./gradlew ktlintCheck --no-daemon

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a6eb569d40f678a6a45645d5f0cd7e7a2f09e # v4.0.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        working-directory: accounts-clerk/hermes-android
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f94d65e9e777e809609a6f9b176274049d2 # v4.6.2
        with:
          name: test-results
          path: accounts-clerk/hermes-android/**/build/reports/tests/

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f07e4900b4c109c6ba6c9b9c2771d9ce7a302a47 # v3.28.9
        with:
          languages: kotlin, java

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a6eb569d40f678a6a45645d5f0cd7e7a2f09e # v4.0.1
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build for CodeQL
        working-directory: accounts-clerk/hermes-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f07e4900b4c109c6ba6c9b9c2771d9ce7a302a47 # v3.28.9
        with:
          category: "/language:kotlin-java"